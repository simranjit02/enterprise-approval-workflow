_schema-version: 3.3.0
ID: enterprise-approval-workflow
version: 1.0.0
description: "Enterprise Approval Workflow built with SAP CAP, XSUAA and SAP Build Process Automation."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: enterprise-approval-workflow-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: enterprise-approval-workflow-db
      - name: enterprise-approval-workflow-auth

  - name: enterprise-approval-workflow-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: enterprise-approval-workflow-db

  - name: enterprise-approval-workflow
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: enterprise-approval-workflow-auth
      - name: enterprise-approval-workflow-html5-runtime
      - name: enterprise-approval-workflow-destination
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: enterprise-approval-workflow-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: enterprise-approval-workflow-html5-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - approvalui.zip
          name: approvalui
          target-path: resources/

  - name: approvalui
    type: html5
    path: app/approval-ui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

resources:
  - name: enterprise-approval-workflow-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: enterprise-approval-workflow-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: enterprise-approval-workflow-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
    requires:
      - name: app-api

  - name: enterprise-approval-workflow-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      service-name: enterprise-approval-workflow-destination
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
        version: 1.0.0

  - name: enterprise-approval-workflow-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
      service-name: enterprise-approval-workflow-html5-host

  - name: enterprise-approval-workflow-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
      service-name: enterprise-approval-workflow-html5-runtime
