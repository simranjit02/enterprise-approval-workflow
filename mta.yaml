_schema-version: 3.3.0
ID: enterprise-approval-workflow
description: Enterprise Approval Workflow built with SAP CAP, XSUAA and SAP Build
  Process Automation.
version: 1.0.0
modules:
  - name: enterprise-approval-workflow-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: enterprise-approval-workflow-db
      - name: uaa_enterprise-approval-workflow
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci

  - name: enterprise-approval-workflow-approuter
    type: approuter.nodejs
    path: app/approval-ui/approuter
    requires:
      - name: uaa_enterprise-approval-workflow
      - name: enterprise-approval-workflow_html_repo_runtime
      - name: enterprise-approval-workflow-destination-service
      - name: srv-api
    parameters:
      disk-quota: 256M
      memory: 256M
    provides:
      - name: app-api
        properties:
          app-url: ${default-url}

  - name: enterprise-approval-workflow-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: enterprise-approval-workflow-db
    parameters:
      buildpack: nodejs_buildpack

  - name: enterprise-approval-workflow-destination-content
    type: com.sap.application.content
    requires:
      - name: enterprise-approval-workflow-destination-service
        parameters:
          content-target: true
      - name: enterprise-approval-workflow_html_repo_host
        parameters:
          service-key:
            name: enterprise-approval-workflow_html_repo_host-key
      - name: uaa_enterprise-approval-workflow
        parameters:
          service-key:
            name: uaa_enterprise-approval-workflow-key
    parameters:
      content:
        instance:
          destinations:
            - Name: approval_workflow_enterprise_approval_workflow_html_repo_host
              ServiceInstanceName: enterprise-approval-workflow-html5-app-hos1950b391
              ServiceKeyName: enterprise-approval-workflow_html_repo_host-key
              sap.cloud.service: approval-workflow
            - Authentication: OAuth2UserTokenExchange
              Name: approval_workflow_uaa_enterprise_approval_workflow
              ServiceInstanceName: enterprise-approval-workflow-xsuaa-service
              ServiceKeyName: uaa_enterprise-approval-workflow-key
              sap.cloud.service: approval-workflow
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true

  - name: enterprise-approval-workflow-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: enterprise-approval-workflow_html_repo_host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - approvalui.zip
          name: approvalui
          target-path: resources/

  - name: approvalui
    type: html5
    path: app/approval-ui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

resources:
  - name: enterprise-approval-workflow-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: enterprise-approval-workflow-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
            existing_destinations_policy: update
        version: 1.0.0
      service: destination
      service-name: enterprise-approval-workflow-destination-service
      service-plan: lite
    requires:
      - name: srv-api

  - name: enterprise-approval-workflow_html_repo_host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: enterprise-approval-workflow-html5-app-hos1950b391
      service-plan: app-host

  - name: enterprise-approval-workflow_html_repo_runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: enterprise-approval-workflow-html5-app-runtime
      service-plan: app-runtime

  - name: uaa_enterprise-approval-workflow
    type: org.cloudfoundry.managed-service
    parameters:
      path: ./xs-security.json
      service: xsuaa
      service-name: enterprise-approval-workflow-xsuaa-service
      service-plan: application

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production